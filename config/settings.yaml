ai:
  # Provider: "claude" or "openai"
  provider: "openai"
  model_claude: "claude-opus-4-6"
  # Sensitive config (api_key, api_base_url, model_openai, max_tokens) moved to config/api_keys.yaml
  language: "bilingual"

schedule:
  interval_hours: 6

storage:
  seen_file: "data/seen.json"
  articles_dir: "articles"
  summaries_dir: "summaries"

git:
  auto_push: true
  remote: "origin"
  branch: "main"

logging:
  level: "INFO"
  file: "rss-digest.log"

# Error handling
retry:
  max_attempts: 2
  timeout_seconds: 30

# Content limits
content:
  max_chars_for_ai: 8000  # Truncate articles longer than this before sending to AI

# Date filter
fetch:
  # Only fetch articles from the last N days (0 = no limit)
  max_days_back: 2
  # Maximum articles to process per run (0 = no limit)
  # Recommended: 20-50 to avoid high API costs
  max_articles_per_run: 30